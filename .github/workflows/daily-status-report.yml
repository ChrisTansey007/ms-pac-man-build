name: Daily Status Report

on:
  schedule:
    - cron: '0 8 * * *'  # Daily at 8 AM UTC
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Generate status report
        run: npm run status:generate
      - name: Generate assignment report
        run: npm run assignments:report
      - name: Run audit
        run: npm run audit || true
      - name: Commit reports
        run: |
          git config user.name "ROWS Status Bot"
          git config user.email "rows-bot@users.noreply.github.com"
          git add STATUS.md agent-os/reports/
          git diff --staged --quiet || git commit -m "chore: daily status and assignment reports"
          git push
