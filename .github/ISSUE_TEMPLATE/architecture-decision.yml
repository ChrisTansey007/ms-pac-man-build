name: Architecture Decision
description: Propose or record an architecture decision.
title: "[ADR]: "
labels: ["architecture", "decision"]
body:
  - type: input
    id: adr_number
    attributes:
      label: ADR Number
      placeholder: "ADR-XXXX"
    validations:
      required: true
  - type: textarea
    id: title_field
    attributes:
      label: Title
      description: "Short, descriptive title for the decision"
    validations:
      required: true
  - type: dropdown
    id: status
    attributes:
      label: Status
      options:
        - proposed
        - accepted
        - deprecated
        - superseded
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: "What is the issue motivating this decision?"
    validations:
      required: true
  - type: textarea
    id: decision
    attributes:
      label: Decision
      description: "What is the decision?"
    validations:
      required: true
  - type: textarea
    id: consequences
    attributes:
      label: Consequences
      description: "What becomes easier or harder because of this decision?"
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: "What other options were evaluated and why were they rejected?"
