name: Bug Report
description: Report a bug discovered during development or verification.
title: "[BUG]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Bug Description
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: "1. \n2. \n3. "
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: input
    id: related_task
    attributes:
      label: Related Task ID
      placeholder: "TASK-XXXX"
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - critical (blocks release)
        - high (blocks feature)
        - medium (workaround exists)
        - low (cosmetic)
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: "OS, browser, Node version, etc."
